# Frontmatter Schema — gabrielebaldassarre.com
# ============================================
# Schema di riferimento per il frontmatter YAML dei post Jekyll.
# Questo file descrive tutti i campi, i loro tipi, valori di default e
# comportamento. È la source of truth per pipeline automatiche (broadcast,
# SEO, readability) e per la validazione pre-deploy.
#
# Convenzioni:
#   ? campo           → campo opzionale
#   [campo, ...]      → array
#   campo: tipo       → tipo atteso
#   default: valore   → valore predefinito se omesso
#   DEPRECATED        → supportato per retrocompatibilità, in via di rimozione

# ── Root-level fields ──────────────────────────────────────────────────

title:           string                          # Titolo del post (obbligatorio)
subtitle:        string?                         # Sottotitolo
excerpt:         string?                         # Estratto (SEO + preview card)
description:     string?                         # Meta description (default: excerpt)
category:        string?                         # Categoria principale (es. "DevOps", "Fisica")
tags:            [string]?                       # Tag del post
master:          string?                         # Percorso immagine master (Cloudinary)
canonical_url:   string?                         # URL canonico (se diverso dal permalink)
mermaid:         boolean?                        # Abilita diagrammi Mermaid nella pagina
future:          boolean?                        # Forza pubblicazione post futuro
words_per_minute: integer?                       # Override WPM per reading time

# ── header — Hero image e parametri visivi ─────────────────────────────

header:
  overlay_image:   string?                       # Percorso immagine hero. Alternativa a page.master, supporta Cloudinary transforms
  overlay_filter:  number?                       # Opacità overlay (0–1, default: 0.5)
  overlay_alt:     string?                       # Testo alternativo (default: page.title)
  teaser:          string?                       # Immagine teaser per card/anteprima
  og_image:        string?                       # Immagine Open Graph (default: master)

  # Transform & overlay parameters (applicati a master o overlay_image)
  logo:             boolean|string?              # true = site_logo, "custom.png" = logo custom, false/nil = nessuno
  caption:          string?                      # Testo alt per hero (solo attributo alt="")
  transform:        "keystone"|"cinematic"?      # Template di trasformazione visiva
  intensity:        "low"|"medium"|"high"?       # Intensità della trasformazione (default: medium)

# ── broadcast — Configurazione social e pipeline ───────────────────────

broadcast:
  channels:        [string]?                     # Canali target: linkedin, mastodon, bluesky, youtube
  sent:            boolean?                      # true = già inviato, la pipeline lo salta

  # Per-channel image config (applicati a page.master o overlay_image via Cloudinary)
  mastodon_image:
    overlay_image: string?                        # Override immagine per questo canale (default: page.master)
    logo:           boolean|string?               # Logo overlay per Mastodon
    caption:        boolean|string?               # true = page.title, stringa = testo custom
    color:          string?                       # Colore testo (white, black, ...)
    transform:      "keystone"|"cinematic"?       # Template di trasformazione
    intensity:      "low"|"medium"|"high"?        # Intensità

  linkedin_image:
    overlay_image: string?                        # Override immagine per questo canale (default: page.master)
    logo:           boolean|string?               # Logo overlay per LinkedIn
    caption:        boolean|string?               # true = page.title, stringa = testo custom
    color:          string?                       # Colore testo
    transform:      "keystone"|"cinematic"?       # Template di trasformazione
    intensity:      "low"|"medium"|"high"?        # Intensità

# ── Transform presets (Cloudinary) — % values, colon-separated ─────────
# Keystone: prospettiva 3/4 asimmetrica, effetto poster inclinato
#   low:    b_rgb:0f0f23/e_distort:1p:1p:94p:10p:100p:100p:0p:95p
#   medium: b_rgb:0f0f23/e_distort:2p:2p:88p:15p:100p:100p:0p:95p
#   high:   b_rgb:0f0f23/e_distort:4p:3p:82p:20p:100p:100p:0p:95p
#
# Cinematic: stesse distorsioni, sfondo navy (#0a0a1a vs #0f0f23)
#   low:    b_rgb:0a0a1a/e_distort:1p:1p:94p:10p:100p:100p:0p:95p
#   medium: b_rgb:0a0a1a/e_distort:2p:2p:88p:15p:100p:100p:0p:95p
#   high:   b_rgb:0a0a1a/e_distort:4p:3p:82p:20p:100p:100p:0p:95p

# ── Cloudinary overlay parameters ──────────────────────────────────────
# Logo circolare: c_fill,g_face,w_{size},h_{size},r_max,f_auto,q_auto,bo_2px_solid_rgb:ffffff
# Hero logo: w_80, g_north_east, x_96, y_40 (top-right, ~5% margin)
# Social logo: w_60, g_south_east, x_30, y_30 (bottom-right)
# Social caption: Roboto 36px bold, g_south_west, w_800, c_fit, 2 righe
# Gradient fade: e_gradient_fade:symmetric,50 (quando caption presente)
# Font: Roboto (Google Font, il più simile al system font stack del blog)

# ── Readability (popolato a build-time dal plugin readability.rb) ──────
# page.readability.flesch_vacca          → Flesch-Kincaid Franchini-Vacca 1972 (0–100)
# page.readability.gulpease              → GULPEASE (0–100)
# page.readability.word_count            → Numero parole
# page.readability.sentence_count        → Numero frasi
# page.readability.syllable_count        → Numero sillabe
# page.readability.avg_sentence_length   → Lunghezza media frase
# page.readability.educational_level     → Livello scolastico lessicale (inglese)
# page.readability.typical_age_range     → Fascia d'età lessicale

# ── Image metadata (semantic enrichment) ───────────────────────────────
# Applicabile sia a master che a {% cloudinary %} body images
# Vedi taxonomy completa: role × context matrix

image_meta:
  role:             "decorative|screenshot|diagram|chart|photo|illustration|code"
  context:          "step|result|architecture|comparison|reference|evidence|ambient"
  caption:          string?                       # Didascalia breve
  long_description: string?                       # Obbligatorio per diagram e chart
  step:             integer?                      # Obbligatorio se context=step
  compare_with:     string?                       # Obbligatorio se context=comparison
  representativeOfPage: boolean?                  # default: false

# Role:
#   decorative   → alt="" role="presentation", no figure, no JSON-LD
#   screenshot   → figure + caption
#   diagram      → figure + caption + long_description obbligatorio
#   chart        → figure + caption + long_description obbligatorio
#   photo        → figure + caption
#   illustration → figure + caption
#   code         → figure + caption

# Context:
#   step         → id="step-N-image" + HowToStep linking
#   result       → representativeOfPage candidate
#   architecture → natural pair with diagram
#   comparison   → data-compare-with + compare_with required
#   reference    → external source citation
#   evidence     → proof/demonstration
#   ambient      → class="ambient-image"

# ── Mermaid diagrams ───────────────────────────────────────────────────
# Sottocaso di role: diagram con source_type: mermaid
# A build-time il sorgente Mermaid viene convertito in SVG dalla gem
# jekyll-mermaid-prebuild (prefers-color-scheme: auto → light + dark SVG)

mermaid:
  diagram_type:   "flowchart|sequence|class|state|er|gantt|pie|mindmap|gitgraph|journey|architecture"
  direction:      "TB|LR|RL|BT"                 # Solo per flowchart
  accTitle:       string?                        # Accessibilità: titolo SVG (→ alt)
  accDescr:       string?                        # Accessibilità: descrizione SVG (→ long_description)

# I campi accTitle e accDescr nel sorgente Mermaid vengono mappati
# automaticamente su alt e long_description della tassonomia immagini.

# ── Series — Multi-post series navigation ────────────────────────────────
# I post che appartengono a una serie vengono collegati automaticamente con:
#   - Navigazione prev/next (_includes/series_nav.html)
#   - Indice della serie (_includes/series_index.html)
#   - Structured data ItemList per SEO (_includes/seo.html)
#
# L'associazione è gestita dal plugin _plugins/series.rb a build time
# raggruppando i post per series.id e ordinandoli per data.
#
# L'agente /annotate-post può popolare questi campi automaticamente
# quando riconosce il pattern "parte X" nel titolo o reference incrociate.

series:
  id:           string?                       # Identificatore univoco della serie (kebab-case, es. "dashboard-astrometria")
  title:        string?                       # Titolo human-readable della serie (es. "Il cielo in salotto")
  part:         integer?                      # Numero di questo post nella serie (1-based)
  total_parts:  integer?                      # Numero totale di post nella serie

# ── 3D Model — Modelli CAD associati al post ────────────────────────────
# I file sorgente vivono in _cad/<slug>/, gli output generati:
#   assets/3d/<slug>/              STL + 3MF (print)
#   assets/images/3d/<slug>-*.png  Blueprint previews (master hero images)
#   assets/overlays/<slug>.png     Solid transparent cropped (compositing)
#
# La compilazione è locale (make cad), non in CI.
#
# Il layout _layouts/asset-3d.html usa questo blocco per generare la
# download card con preview, link a Thingiverse/Printables, e markup
# Schema.org 3DModel.
#
# Design future-proof: sources accetta scad, blend, f3d, step.

3d_model:
  # ── Source files (at least one required) ─────────────────────────
  sources:
    scad:          string?                       # Path .scad (default: _cad/<slug>/<slug>.scad)
    blender:       string?                       # Path .blend (Blender) — future
    f3d:           string?                       # Path .f3d (Fusion 360) — future
    step:          string?                       # Path .step (CAD interchange) — future

  # ── Exports generated by make cad ─────────────────────────────────
  exports:
    stl:           string?                       # Path STL (assets/3d/<slug>/<slug>.stl)
    3mf:           string?                       # Path 3MF (assets/3d/<slug>/<slug>.3mf)

  # ── Preview renders ───────────────────────────────────────────────
  previews:
    isometric:     string?                       # Path PNG blueprint lineart (assets/images/3d/<slug>-isometric.png)
    ortho:         string?                       # Path PNG ortho composed sheet (assets/images/3d/<slug>-ortho.png)
    overlay:       string?                       # Path PNG solid transparent cropped (assets/overlays/<slug>.png)

  # ── Render settings ───────────────────────────────────────────────
  color_scheme:     "blueprint"|"monochrome"|"render"?  # Schema cromatico (default: blueprint)
  explode_distance: number?                       # mm di esplosione (default: 25)

  # ── Asset metadata (single source of truth) ───────────────────────
  designed_for:     string?                       # Uso previsto (es. "Desk cable management, 60 mm hole")
  material:         string?                       # Materiale consigliato (es. "PLA, PETG")
  print_settings:
    nozzle:         number?                       # mm (default: 0.4)
    layer_height:   number?                       # mm (default: 0.2)
    infill:         string?                       # Percentuale e pattern (es. "15% gyroid")
    supports:       boolean?                      # Richiede supporti?
  dimensions:
    width:          number?                       # mm
    depth:          number?                       # mm
    height:         number?                       # mm
  license:          string?                       # Default: MIT

  # ── External platforms (download mirrors) ─────────────────────────
  downloads:
    thingiverse:
      url:          string?                       # Link alla pagina Thingiverse
      id:           string?                       # Thingiverse thing ID
    printables:
      url:          string?                       # Link alla pagina Printables
      id:           string?                       # Printables model ID

# ── Thingiverse — Broadcast pipeline ─────────────────────────────────
# La pipeline broadcast-thingiverse cerca post con `3d_model.downloads.thingiverse.url`
# popolato MA `thingiverse.sent: true` assente.  Dopo il push marca
# `sent: true` via work branch (stesso pattern di broadcast-social).
#
# Se il modello è nuovo (non ancora su Thingiverse), la pipeline chiama
# GitHub Model LLM per generare la descrizione in inglese usando come
# contesto il contenuto del post e il frontmatter 3d_model.

thingiverse:
  sent:            boolean?                      # true = già pubblicato su Thingiverse
  title:           string?                       # Override titolo (default: page.title tradotto EN via LLM)
  tags:            [string]?                     # Override tags (default: page.tags tradotti EN via LLM)
  category:        string?                       # Thingiverse category (es. "3D Printing > Household")
  license:         string?                       # Default: MIT

# ── Content difficulty & audience ──────────────────────────────────────
# Layer dichiarato (autore) + Layer calcolato (build time)
# 
# Pipeline:
#   1. Autore (o LLM via /annotate-post) popola:
#      - intended_audience, proficiency_level, difficulty_declared
#      - knowledge_prerequisites (concept, label, url, sameAs, importance, depth)
#      - difficulty_computed.semantic (metriche qualitative dell'LLM)
#   2. A build time, difficulty.rb:
#      - Fonde difficulty_computed.semantic con difficulty_computed.lexical (Gulpease)
#      - Ricalcola difficulty_composite (40% declared + 30% lexical + 30% semantic)
#      - Genera difficulty_label, difficulty_declared_display, etc.
#      - Popola il termsdictionary da tutti i knowledge_prerequisites dei post
#   3. Le modifiche alle formule di calcolo NON richiedono di ri-eseguire LLM

intended_audience:    "general|curious|student|practitioner|specialist"
proficiency_level:    "beginner|intermediate|advanced|expert"

knowledge_prerequisites:
  - concept:     string                        # Identificativo canonico (kebab-case, es. "home-assistant")
    label:       string                        # Etichetta human-readable
    url:         string?                       # Link a risorsa esterna (Wikipedia, docs, articolo)
    sameAs:      string?                       # URL Wikidata (es. "https://www.wikidata.org/wiki/Q5731200")
    importance:  "required|recommended|helpful" # required=bloccante, recommended=importante-ma-non-bloccante, helpful=arricchimento
    depth:       0-5                           # Profondità nel grafo della conoscenza (0=comune, 4+=specialistico)

difficulty_declared:
  conceptual:    1-5                           # Difficoltà concettuale
  technical:     1-5                           # Difficoltà tecnica
  mathematical:  0-5                           # Livello matematico (0=nessuno)

# difficulty_computed (iniettato dall'agente LLM, fuso con lexical a build time):
#   semantic:
#     concept_count                  # Concetti NON definiti inline
#     concept_density                # concept_count / paragrafi prosa
#     jargon_ratio                   # (termini_tecnici / parole_prosa) * 100
#     definition_coverage            # concetti_definiti / totale_concetti
#     external_knowledge_demand      # Concetti né definiti né linkati
#     prerequisite_depth             # Media pesata delle profondità dei concetti
#     math_density                   # (formule_matematiche / paragrafi) * 10
#     code_density                   # (righe_codice / righe_totali) * 10
#     blocking_prerequisite_count    # Numero di prerequisiti con importance=required
#
#   lexical: (popolato a build time da readability.rb)
#     flesch_reading_ease, gulpease, avg_sentence_length,
#     word_count, reading_time_minutes
#
# difficulty_composite: 40% declared + 30% lexical + 30% semantic
# Badge: ◉◉◎◎◎ Accessibile / Intermedio / Avanzato / Esperto

# ── Terms Dictionary (auto-popolato a build time) ───────────────────────
# Il termsdictionary è popolato dal plugin difficulty.rb a build time
# pescando i knowledge_prerequisites di tutti i post e deduplicando per
# campo `concept`. Sostituisce il file hardcoded _data/glossary.yml.
#
# Ogni entry eredita:
#   concept, label, url, sameAs, depth (dal primo post che lo menziona)
#   post_count: numero di post che menzionano il concetto
#   posts: [url dei post che lo menzionano]
#
# Usato per:
#   - SEO (DefinedTerm in JSON-LD)
#   - Ricerca semantica
#   - Validazione incrociata dei prerequisiti

# ── Custom Liquid tags ─────────────────────────────────────────────────
# {% post_link /url/ "text" %}  → Link interno safe (fallback a plain text)
# {% repo_url path "text" %}   → Link a file su GitHub (fallback a plain text)
# {% cloudinary path %}         → Immagine via Cloudinary (body)
# {% xlink "url" "text" role="..." context="..." target="..." %}

# ── Link metadata taxonomy ─────────────────────────────────────────────
# Applicabile via {% xlink %}, {% post_link role="..." %}, {% repo_url role="..." %}

# role — Cos'è il link
#   citation        → Paper, libro, standard citato → Schema.org citation
#   source          → Fonte primaria di dato/claim  → Schema.org isBasedOn
#   definition      → Rimando a definizione         → Schema.org about
#   tool            → Strumento/software menzionato → Schema.org mentions
#   prerequisite    → Contenuto da conoscere prima  → Schema.org isBasedOn
#   deepening       → Approfondimento facoltativo   → Schema.org relatedLink
#   related         → Contenuto correlato           → Schema.org relatedLink
#   self            → Auto-referenza                → Schema.org mainEntityOfPage
#   demo            → Esempio/playground            → Schema.org workExample
#   download        → File scaricabile              → Schema.org downloadUrl
#   attribution     → Credito a un autore           → Schema.org creator
#   commercial      → Link sponsorizzato            → Schema.org offers (rel=sponsored)

# context — Che funzione ha
#   supports-claim, provides-context, enables-step, validates-result,
#   credits-author, offers-alternative, extends-topic

# target — Dove porta
#   internal, external-authoritative, external-community,
#   external-commercial (→ sponsored), external-ugc
