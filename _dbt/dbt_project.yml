# dbt project — gabrielebaldassarre.com SEO Analytics
# =====================================================
# Run locally:   dbt run --profiles-dir _dbt
# Run in CI:     python3 _scripts/seo/dbt_runner.py
#
# Models are compiled against D1's SQLite-compatible dialect.
# Execution against D1 happens via the HTTP API, not via dbt adapter.

name: 'gabriele_seo'
version: '1.0'
profile: 'gabriele_seo'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"

models:
  gabriele_seo:
    staging:
      +materialized: view
      +schema: staging
    analytics:
      +materialized: table
      +schema: analytics
      # Per-model contract enforcement is declared inside analytics/schema.yml
      # (dim_posts, fct_seo_metrics). Other models opt-in explicitly.
