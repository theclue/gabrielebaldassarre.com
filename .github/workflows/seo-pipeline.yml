name: SEO Post-Deploy Pipeline

on:
  workflow_run:
    workflows: ["Deploy blog on Cloudflare Pages"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      urls:
        description: 'URL da verificare (separati da spazio). Se vuoto, il workflow cercherà automaticamente i post modificati'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: seo-pipeline
  cancel-in-progress: false

jobs:
  indexnow:
    name: IndexNow — Notifica motori di ricerca
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trova URL da notificare 🔍
        id: find
        env:
          INPUT_URLS: ${{ inputs.urls }}
        run: |
          normalize_url() {
            local raw="$1"
            local cleaned=$(echo "$raw" | sed 's/\.\(md\|Rmd\|MD\)$//')
            if echo "$cleaned" | grep -q '_posts/'; then
              local d=$(dirname "$cleaned" | xargs basename)
              local s=$(basename "$cleaned" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              echo "https://gabrielebaldassarre.com/${d}/${s}/"
            elif echo "$cleaned" | grep -q '^/'; then
              echo "https://gabrielebaldassarre.com${cleaned}"
            else
              echo "https://gabrielebaldassarre.com/${cleaned}"
            fi
          }

          : > /tmp/indexnow_urls.txt

          if [ -n "$INPUT_URLS" ]; then
            for u in $INPUT_URLS; do
              normalize_url "$u" >> /tmp/indexnow_urls.txt
            done
          else
            BEFORE="${{ github.event.workflow_run.head_commit.id }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi

            if git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null | while read post; do
                [ -z "$post" ] && continue
                normalize_url "$post" >> /tmp/indexnow_urls.txt
              done
            fi
          fi

          count=$(wc -l < /tmp/indexnow_urls.txt 2>/dev/null || echo 0)
          echo "URL da notificare: ${count}"
          cat /tmp/indexnow_urls.txt

          if [ "$count" -eq 0 ]; then
            echo "no_urls=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_urls=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Invia notifiche IndexNow 📡
        if: steps.find.outputs.no_urls != 'true'
        run: |
          KEY="b8f09512fca218ea59ed4b754cfecab6"
          URLS=$(jq -R -s -c 'split("\n") | map(select(length > 0))' /tmp/indexnow_urls.txt)

          echo "🚀 Invio notifica IndexNow per $(echo "$URLS" | jq 'length') URL..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\": \"gabrielebaldassarre.com\", \"key\": \"$KEY\", \"urlList\": $URLS}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📥 Risposta IndexNow: HTTP ${HTTP_CODE}"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "⚠️  IndexNow: risposta inattesa (HTTP ${HTTP_CODE}) — verifica key file e URL"
          else
            echo "✅ URL notificati con successo ai motori di ricerca"
          fi

  pagespeed:
    name: PageSpeed Insights
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trova URL da verificare 🔍
        id: find
        env:
          INPUT_URLS: ${{ inputs.urls }}
        run: |
          url_from_post() {
            local raw="$1"
            local cleaned=$(echo "$raw" | sed 's/\.\(md\|Rmd\|MD\)$//')
            if echo "$cleaned" | grep -q '_posts/'; then
              local d=$(dirname "$cleaned" | xargs basename)
              local s=$(basename "$cleaned" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              echo "/${d}/${s}/"
            elif echo "$cleaned" | grep -q '^/'; then
              echo "$cleaned"
            else
              echo "/${cleaned}"
            fi
          }

          : > /tmp/psi_urls.txt

          echo "/" >> /tmp/psi_urls.txt

          if [ -n "$INPUT_URLS" ]; then
            for u in $INPUT_URLS; do
              url_from_post "$u" >> /tmp/psi_urls.txt
            done
          else
            BEFORE="${{ github.event.workflow_run.head_commit.id }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi

            if git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null | while read post; do
                [ -z "$post" ] && continue
                url_from_post "$post" >> /tmp/psi_urls.txt
              done
            fi
          fi

          cat /tmp/psi_urls.txt | sort -u > /tmp/psi_urls_unique.txt
          count=$(wc -l < /tmp/psi_urls_unique.txt 2>/dev/null || echo 0)
          echo "URL da verificare: ${count}"

          if [ "$count" -eq 0 ]; then
            echo "no_urls=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Analizza PageSpeed Insights 📊
        if: steps.find.outputs.no_urls != 'true'
        run: |
          API_KEY="${{ secrets.PAGESPEED_API_KEY }}"
          HAS_ERRORS=0

          while read -r path; do
            [ -z "$path" ] && continue
            URL="https://gabrielebaldassarre.com${path}"
            echo ""
            echo "🔍 Analisi: ${URL}"

            # Mobile
            MOBILE=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=mobile&key=${API_KEY}")
            PERF=$(echo "$MOBILE" | jq -r '(.lighthouseResult.categories.performance.score // 0) * 100')
            A11Y=$(echo "$MOBILE" | jq -r '(.lighthouseResult.categories.accessibility.score // 0) * 100')
            SEO=$(echo "$MOBILE" | jq -r '(.lighthouseResult.categories.seo.score // 0) * 100')
            LCP=$(echo "$MOBILE" | jq -r '.lighthouseResult.audits["largest-contentful-paint"].displayValue // "N/A"')
            TBT=$(echo "$MOBILE" | jq -r '.lighthouseResult.audits["total-blocking-time"].displayValue // "N/A"')
            CLS=$(echo "$MOBILE" | jq -r '.lighthouseResult.audits["cumulative-layout-shift"].displayValue // "N/A"')

            echo "  📱 Mobile  | Perf: ${PERF}% | A11y: ${A11Y}% | SEO: ${SEO}% | LCP: ${LCP} | TBT: ${TBT} | CLS: ${CLS}"

            # Desktop
            DESKTOP=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=desktop&key=${API_KEY}")
            D_PERF=$(echo "$DESKTOP" | jq -r '(.lighthouseResult.categories.performance.score // 0) * 100')
            D_A11Y=$(echo "$DESKTOP" | jq -r '(.lighthouseResult.categories.accessibility.score // 0) * 100')

            echo "  🖥️  Desktop | Perf: ${D_PERF}% | A11y: ${D_A11Y}%"

            # Alert solo su problemi seri
            if [ -n "$PERF" ] && [ "$(echo "$PERF < 50" | bc -l 2>/dev/null)" = "1" ]; then
              echo "  ⚠️  PERFORMANCE MOBILE SOTTO SOGLIA CRITICA: ${PERF}%"
              HAS_ERRORS=1
            fi
            if [ -n "$A11Y" ] && [ "$(echo "$A11Y < 80" | bc -l 2>/dev/null)" = "1" ]; then
              echo "  ⚠️  ACCESSIBILITÀ MOBILE SOTTO SOGLIA: ${A11Y}%"
              HAS_ERRORS=1
            fi

          done < /tmp/psi_urls_unique.txt

          echo ""
          if [ "$HAS_ERRORS" -eq 1 ]; then
            echo "⚠️  PageSpeed Insights: problemi rilevati su alcuni URL. Vedi log sopra."
          else
            echo "✅ PageSpeed Insights: tutto nella norma"
          fi

  hermes-seo:
    name: Hermes SEO Audit
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trova URL da verificare 🔍
        id: find
        env:
          INPUT_URLS: ${{ inputs.urls }}
        run: |
          url_from_post() {
            local raw="$1"
            local cleaned=$(echo "$raw" | sed 's/\.\(md\|Rmd\|MD\)$//')
            if echo "$cleaned" | grep -q '_posts/'; then
              local d=$(dirname "$cleaned" | xargs basename)
              local s=$(basename "$cleaned" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              echo "/${d}/${s}/"
            elif echo "$cleaned" | grep -q '^/'; then
              echo "$cleaned"
            else
              echo "/${cleaned}"
            fi
          }

          : > /tmp/hermes_urls.txt

          echo "/" >> /tmp/hermes_urls.txt

          if [ -n "$INPUT_URLS" ]; then
            for u in $INPUT_URLS; do
              url_from_post "$u" >> /tmp/hermes_urls.txt
            done
          else
            BEFORE="${{ github.event.workflow_run.head_commit.id }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi

            if git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null | while read post; do
                [ -z "$post" ] && continue
                url_from_post "$post" >> /tmp/hermes_urls.txt
              done
            fi
          fi

          wc -l < /tmp/hermes_urls.txt

      - name: Audit SEO via Hermes 🔬
        run: |
          echo "🔬 Hermes SEO Audit in corso..."
          echo ""

          while read -r path; do
            [ -z "$path" ] && continue
            URL="https://gabrielebaldassarre.com${path}"
            echo "📋 ${URL}"

            RESULT=$(curl -s "https://hermesforge.dev/api/seo?url=${URL}")

            SCORE=$(echo "$RESULT" | jq -r '.score // "N/A"')
            GRADE=$(echo "$RESULT" | jq -r '.grade // "N/A"')
            ISSUES=$(echo "$RESULT" | jq -r '.issues // []')
            ISSUE_COUNT=$(echo "$ISSUES" | jq 'length')
            WARNINGS=$(echo "$RESULT" | jq -r '.warnings // []')
            WARN_COUNT=$(echo "$WARNINGS" | jq 'length')
            PASSED=$(echo "$RESULT" | jq -r '.passed // []')
            PASS_COUNT=$(echo "$PASSED" | jq 'length')

            echo "  Punteggio: ${SCORE}/100 (${GRADE})"
            echo "  Problemi: ${ISSUE_COUNT} | Warning: ${WARN_COUNT} | OK: ${PASS_COUNT}"

            if [ "$ISSUE_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  🔴 Problemi:"
              echo "$ISSUES" | jq -r '.[] | "    - [\(.category)] \(.issue) (\(.severity))"'
            fi
            if [ "$WARN_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  🟡 Warning:"
              echo "$WARNINGS" | jq -r '.[] | "    - [\(.category)] \(.issue)"'
            fi

            echo ""
            sleep 1
          done < /tmp/hermes_urls.txt

          echo "✅ Hermes SEO Audit completato"

  seo-score:
    name: SEO Score API (informativo)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trova URL da verificare 🔍
        id: find
        env:
          INPUT_URLS: ${{ inputs.urls }}
        run: |
          url_from_post() {
            local raw="$1"
            if echo "$raw" | grep -q '_posts/'; then
              local d=$(dirname "$raw" | xargs basename)
              local s=$(basename "$raw" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              echo "https://gabrielebaldassarre.com/${d}/${s}/"
            elif echo "$raw" | grep -q '^http'; then
              echo "$raw"
            elif echo "$raw" | grep -q '^/'; then
              echo "https://gabrielebaldassarre.com${raw}"
            else
              echo "https://gabrielebaldassarre.com/${raw}"
            fi
          }

          : > /tmp/seoscore_urls.txt
          echo "https://gabrielebaldassarre.com/" >> /tmp/seoscore_urls.txt

          if [ -n "$INPUT_URLS" ]; then
            for u in $INPUT_URLS; do
              url_from_post "$u" >> /tmp/seoscore_urls.txt
            done
          else
            BEFORE="${{ github.event.workflow_run.head_commit.id }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi
            if git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null | while read post; do
                [ -z "$post" ] && continue
                url_from_post "$post" >> /tmp/seoscore_urls.txt
              done
            fi
          fi

      - name: SEO Score check 📊
        run: |
          echo "📊 SEO Score API — puramente informativo, non bloccante"
          echo ""

          while read -r url; do
            [ -z "$url" ] && continue
            echo "🔍 ${url}"

            RESULT=$(curl -s "https://hermesforge.dev/api/seo?url=${url}")
            SCORE=$(echo "$RESULT" | jq -r '.score // "N/A"')
            GRADE=$(echo "$RESULT" | jq -r '.grade // "N/A"')
            ISSUE_COUNT=$(echo "$RESULT" | jq '.issues | length // 0')
            PASS_COUNT=$(echo "$RESULT" | jq '.passed | length // 0')

            echo "  Punteggio: ${SCORE}/100 (${GRADE}) | Problemi: ${ISSUE_COUNT} | OK: ${PASS_COUNT}"

            # Dettagli passati
            PASSED_ITEMS=$(echo "$RESULT" | jq -r '.passed[]? | "    ✅ [\(.category)] \(.detail)"' 2>/dev/null)
            if [ -n "$PASSED_ITEMS" ]; then
              echo "$PASSED_ITEMS"
            fi

            echo ""
            sleep 1
          done < /tmp/seoscore_urls.txt

          echo ""
          echo "✅ SEO Score check completato"

  lighthouse:
    name: Lighthouse CI (post-deploy)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trova URL da verificare 🔍
        id: find
        env:
          INPUT_URLS: ${{ inputs.urls }}
        run: |
          full_url() {
            local raw="$1"
            local cleaned=$(echo "$raw" | sed 's/\.\(md\|Rmd\|MD\)$//')
            if echo "$cleaned" | grep -q '_posts/'; then
              local d=$(dirname "$cleaned" | xargs basename)
              local s=$(basename "$cleaned" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              echo "https://gabrielebaldassarre.com/${d}/${s}/"
            elif echo "$cleaned" | grep -q '^http'; then
              echo "$cleaned"
            elif echo "$cleaned" | grep -q '^/'; then
              echo "https://gabrielebaldassarre.com${cleaned}"
            else
              echo "https://gabrielebaldassarre.com/${cleaned}"
            fi
          }

          : > /tmp/lh_urls.txt
          echo "https://gabrielebaldassarre.com/" >> /tmp/lh_urls.txt

          if [ -n "$INPUT_URLS" ]; then
            for u in $INPUT_URLS; do
              full_url "$u" >> /tmp/lh_urls.txt
            done
          else
            BEFORE="${{ github.event.workflow_run.head_commit.id }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi

            if git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null | while read post; do
                [ -z "$post" ] && continue
                full_url "$post" >> /tmp/lh_urls.txt
              done
            fi
          fi

          count=$(wc -l < /tmp/lh_urls.txt 2>/dev/null || echo 0)
          echo "URL da verificare: ${count}"
          cat /tmp/lh_urls.txt

      - name: Lighthouse CI 🟢
        run: |
          echo "🏠 Avvio Lighthouse CI su URL live (post-deploy, post-warmup)..."
          echo "   Asset Cloudinary già cachati → nessun falso positivo"
          echo ""

          npm install -g @lhci/cli --quiet

          rm -rf .lighthouseci
          HAS_RESULTS=0

          cat /tmp/lh_urls.txt | while read url; do
            [ -z "$url" ] && continue
            SAFE=$(echo "$url" | sed 's|https://||' | sed 's|/|_|g' | cut -c1-60)

            echo "🔍 Analisi: ${url}"
            if npx lhci collect --url="$url" --settings.chromeFlags="--no-sandbox --headless --disable-gpu" --numberOfRuns=1; then
              echo "✅ Raccolta completata per ${url}"
              echo "YES" > /tmp/lh_has_results
            else
              echo "  ⚠️  Collezione fallita per ${url}"
            fi
          done

          echo ""
          echo "📊 Verifica assertion..."
          if [ -f /tmp/lh_has_results ]; then
            npx lhci assert --config=.github/lighthouse/lighthouserc.json || {
              echo ""
              echo "⚠️  Lighthouse CI: alcuni KPI sotto soglia — vedi report sopra"
              echo "   (Post-deploy, puramente informativo — non bloccante)"
            }
          else
            echo "⚠️  Nessun URL raccolto con successo — assertion saltate"
          fi

          # Rinomina file con timestamp e commit per identificazione
          TS=$(date +'%Y%m%d-%H%M%S')
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          mkdir -p lighthouse-results
          echo "📄 Report generati in .lighthouseci/"
          ls -la .lighthouseci/ 2>/dev/null || echo "  (nessun report generato)"
          if [ -f .lighthouseci/assertion-results.json ]; then
            cp .lighthouseci/assertion-results.json "lighthouse-results/assertions-${TS}-${COMMIT}.json"
          else
            echo "[{\"note\": \"no_assertions_ran\", \"timestamp\": \"${TS}\", \"commit\": \"${COMMIT}\"}]" > "lighthouse-results/assertions-${TS}-${COMMIT}.json"
          fi
          for f in .lighthouseci/*.html; do
            [ -f "$f" ] && cp "$f" "lighthouse-results/$(basename "$f" .html)-${TS}.html"
          done
          for f in .lighthouseci/*.json; do
            [ -f "$f" ] && [ "$(basename "$f")" != "assertion-results.json" ] && cp "$f" "lighthouse-results/$(basename "$f" .json)-${TS}.json"
          done

          echo ""
          echo "✅ Lighthouse CI completato"

      - name: Salva report Lighthouse 📥
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-results/
            .lighthouseci/*.html
            .lighthouseci/*.json
          retention-days: 30