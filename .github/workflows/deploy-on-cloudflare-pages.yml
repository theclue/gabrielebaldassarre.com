name: Deploy blog on Cloudflare Pages

on:
  push:
    branches: [main, master]
    paths:
      - "assets/**"
      - "_sass/**"
      - "_scripts/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**.md"
      - "**.R"
      - "**.rb"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/broadcast-social.yml"
      - "!.github/workflows/seo-pipeline.yml"
      - "!.github/workflows/deploy-on-cloudflare-pages.yml"
      - "!README.md"
  pull_request:
    branches: [main, master]
    paths:
      - "assets/**"
      - "_sass/**"
      - "_scripts/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**.md"
      - "**.R"
      - "**.rb"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/broadcast-social.yml"
      - "!.github/workflows/seo-pipeline.yml"
      - "!.github/workflows/deploy-on-cloudflare-pages.yml"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Docker (Buildx) 🐋
        uses: docker/setup-buildx-action@v4
      - name: Build 🔧
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: make site
      - name: Verifica build 🔍
        run: |
          if [ ! -d _site ]; then
            echo "Build fallita: _site/ non trovata"
            exit 1
          fi

      - name: Valida immagini e link 🔬
        run: |
          echo "🔬 Validazione pre-deploy..."
          HAS_ERRORS=0

          if git cat-file -e "HEAD~1" 2>/dev/null; then
            git diff --name-only HEAD~1 HEAD -- '_posts/**.md' '_posts/**.Rmd' 2>/dev/null > /tmp/val_posts.txt
          else
            find _posts -name '*.md' -o -name '*.Rmd' | sort > /tmp/val_posts.txt
          fi

          while read -r post; do
            [ -z "$post" ] && continue
            echo "  📋 ${post}"

            # Estrai path immagine: master:, header.overlay_image, {% cloudinary %}, Markdown ![alt](path)
            IMGS=$(
              grep -oP 'master:\s*\K/assets/images/\S+' "$post" 2>/dev/null || true
              grep -oP 'overlay_image:\s*\K/assets/images/\S+' "$post" 2>/dev/null || true
              grep -oP 'cloudinary.*?/assets/images/[^"% ]+' "$post" 2>/dev/null | grep -oP '/assets/images/\S+' || true
              grep -oP '!\[.*?\]\(/assets/images/[^)]+' "$post" 2>/dev/null | grep -oP '/assets/images/[^)]+' || true
            )

            while read -r img; do
              [ -z "$img" ] && continue
              local_img="${img#/}"  # Rimuovi / iniziale
              if [ ! -f "$local_img" ]; then
                echo "  ❌ IMMAGINE MANCANTE: ${img}"
                HAS_ERRORS=1
              fi
            done <<< "$IMGS"

          done < /tmp/val_posts.txt

          if [ "$HAS_ERRORS" -eq 1 ]; then
            echo "❌ Deploy bloccato: immagini mancanti o link rotti"
            exit 1
          fi
          echo "✅ Validazione superata"

      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=gabrielebaldassarre
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  warmup-cloudinary:
    if: github.event_name == 'push'
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Warmup Cloudinary 🔥
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            BEFORE="HEAD~1"
          fi

          CLD="https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/image/fetch"
          SITE="https://gabrielebaldassarre.com"
          LOGO="/assets/logos/the-16bit-robot.png"
          BAR="/assets/images/1x1-black.png"

          : > /tmp/to_warm.txt

          # 1. Changed posts
          if git cat-file -e "$BEFORE" 2>/dev/null; then
            git diff --name-only "$BEFORE" HEAD -- '_posts/**.md' '_posts/**.Rmd' >> /tmp/to_warm.txt 2>/dev/null || true
          fi

          # 2. Changed images -> find posts referencing them as master
          if git cat-file -e "$BEFORE" 2>/dev/null; then
            git diff --name-only "$BEFORE" HEAD -- 'assets/images/*' 2>/dev/null | while read img; do
              rel="/${img}"
              grep -rl "master:.*${rel}" _posts/ >> /tmp/to_warm.txt 2>/dev/null || true
            done
          fi

          # 3. Body images in cloudinary tags — only from changed posts
          sort -u /tmp/to_warm.txt | while read -r post; do
            [ -z "$post" ] && continue
            grep -oP '{% cloudinary[^%]*/assets/images/[^" ]+' "$post" 2>/dev/null | grep -oP '/assets/images/\S+' >> /tmp/to_warm_extra.txt || true
          done

          # 4. Deduplicate and warm
          sort -u /tmp/to_warm.txt | while read -r post; do
            [ -z "$post" ] && continue
            master=$(grep -oP 'master:\s*\K\S+' "$post" 2>/dev/null | head -1 | tr -d '"')
            if [ -n "$master" ]; then
              echo "🔥 ${master}"
              h="c_fill,g_auto,f_auto,q_auto"
              # Hero plain
              curl -sf -o /dev/null --max-time 30 "${CLD}/${h},w_1922,h_724/${SITE}${master}" || true
              # Social plain (LinkedIn + Mastodon)
              curl -sf -o /dev/null --max-time 30 "${CLD}/${h},w_1200,h_627/${SITE}${master}" || true
              curl -sf -o /dev/null --max-time 30 "${CLD}/${h},w_1200,h_675/${SITE}${master}" || true

              # Transformed versions (keystone + cinematic medium)
              for t in keystone cinematic; do
                bg="0f0f23"
                [ "$t" = "cinematic" ] && bg="0a0a1a"
                pres="b_rgb:${bg}/e_distort:2p:2p:88p:15p:100p:100p:0p:95p/c_crop,g_north_west,x_0.02,y_0.18,w_0.85,h_0.48"
                # Hero transform
                curl -sf -o /dev/null --max-time 30 "${CLD}/${pres}/${h},w_1922,h_724/${SITE}${master}" || true
                # Social transform plain
                curl -sf -o /dev/null --max-time 30 "${CLD}/${pres}/${h},w_1200,h_627/${SITE}${master}" || true
              done
            fi
            # Body images cloudinary
            grep -oP '{% cloudinary[^%]*/assets/images/[^" ]+' "$post" 2>/dev/null | grep -oP '/assets/images/\S+' | while read body_img; do
              curl -sf -o /dev/null --max-time 30 "${CLD}/q_auto,f_auto/${SITE}${body_img}" || true
            done
          done

          # Logo + letterbox (always warm, used across all posts)
          curl -sf -o /dev/null --max-time 30 "${CLD}/w_80,h_80,c_fit,f_auto,q_auto/${SITE}${LOGO}" || true
          curl -sf -o /dev/null --max-time 30 "${CLD}/c_scale,w_1200,h_120,o_80/${SITE}${BAR}" || true

          count=$(sort -u /tmp/to_warm.txt | grep -c . 2>/dev/null || echo 0)
          echo "✅ ${count} post riscaldati"