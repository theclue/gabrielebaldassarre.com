name: Broadcast to Social

on:
  workflow_run:
    workflows: ["Deploy blog on Cloudflare Pages"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Specific post to broadcast (path under _posts/)'
        required: false
        type: string

permissions:
  contents: write
  models: read
  pull-requests: write

concurrency:
  group: broadcast
  cancel-in-progress: false

jobs:
  broadcast:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies 📦
        run: pip install pyyaml

      - name: Find posts to broadcast 🔍
        id: find
        env:
          INPUT_POST_PATH: ${{ inputs.post_path }}
        run: |
          : > /tmp/posts_to_broadcast.txt

          if [ -n "$INPUT_POST_PATH" ]; then
            # Manual dispatch: process specific post
            echo "_posts/$INPUT_POST_PATH" >> /tmp/posts_to_broadcast.txt
          else
            # workflow_run: scan all posts for broadcast: enabled and not sent
            find _posts -name '*.md' -o -name '*.Rmd' | sort > /tmp/all_posts.txt
            while read -r post; do
              [ -z "$post" ] && continue
              # Skip if broadcast: false
              if grep -q 'broadcast:\s*false' "$post" 2>/dev/null; then
                continue
              fi
              # Skip if already sent
              if grep -q 'sent:\s*true' "$post" 2>/dev/null; then
                continue
              fi
              # Include if broadcast: is present (either true or mapping)
              if grep -q 'broadcast:' "$post" 2>/dev/null; then
                echo "$post" >> /tmp/posts_to_broadcast.txt
              fi
            done < /tmp/all_posts.txt
          fi

          # Filter: only include posts that exist
          : > /tmp/to_process.txt
          while read -r post; do
            [ -z "$post" ] && continue
            if [ ! -f "$post" ]; then
              echo "  SALTA (file non trovato): $post"
              continue
            fi
            echo "$post" >> /tmp/to_process.txt
          done < /tmp/posts_to_broadcast.txt

          count=$(wc -l < /tmp/to_process.txt 2>/dev/null || echo 0)
          count=$(echo "$count" | tr -d ' ')
          echo "Post da elaborare: ${count:-0}"
          cat /tmp/to_process.txt

          if [ "${count:-0}" -eq 0 ] 2>/dev/null; then
            echo "no_posts=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_posts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Broadcast posts 📡
        if: steps.find.outputs.no_posts != 'true'
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          POSTS=$(cat /tmp/to_process.txt 2>/dev/null | tr '\n' ' ' | xargs)
          if [ -z "$POSTS" ]; then
            echo "Nessun post da broadcastare."
            exit 0
          fi
          echo "Broadcasting: $POSTS"
          python3 _scripts/broadcast.py $POSTS

      - name: Check for frontmatter changes ✏️
        if: success() && steps.find.outputs.no_posts != 'true'
        id: changes
        run: |
          if git diff --name-only | grep -q '_posts/'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for sent tags 🔖
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          BRANCH="broadcast/sent-${TIMESTAMP}"
          BASE="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add _posts/
          git commit -m "broadcast: mark post(s) as sent

          Auto-generated by broadcast-social workflow."

          git push origin "$BRANCH"

          cat <<EOF > /tmp/pr_body.md
          ## Broadcast completato

          I post sono stati inviati a Buffer come draft.

          ### Modifiche
          \`\`\`
          $(git diff --stat "origin/${BASE}" -- _posts/)
          \`\`\`

          Dopo il merge, il tag \`broadcast.sent: true\` sarà aggiunto ai post.
          Riesamina i draft su [Buffer](https://publish.buffer.com) e approva la pubblicazione.
          EOF

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "broadcast: mark post(s) as sent" \
            --body-file /tmp/pr_body.md

      - name: No posts to process
        if: steps.find.outputs.no_posts == 'true'
        run: echo "Nessun post da broadcastare. Fine."