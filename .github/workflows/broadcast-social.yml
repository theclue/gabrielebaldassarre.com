name: Broadcast to Social

on:
  workflow_run:
    workflows: ["Deploy blog on Cloudflare Pages"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Specific post to broadcast (path under _posts/)'
        required: false
        type: string

permissions:
  contents: write
  models: read
  pull-requests: write
  actions: write

concurrency:
  group: work-pipelines
  cancel-in-progress: false

jobs:
  broadcast:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies 📦
        run: pip install pyyaml

      - name: Find posts to broadcast 🔍
        id: find
        env:
          INPUT_POST_PATH: ${{ inputs.post_path }}
        run: |
          : > /tmp/posts_to_broadcast.txt

          if [ -n "$INPUT_POST_PATH" ]; then
            # Manual dispatch: process specific post
            echo "_posts/$INPUT_POST_PATH" >> /tmp/posts_to_broadcast.txt
          else
            # workflow_run: scan all posts for broadcast: enabled and not sent
            git fetch origin main
            find _posts -name '*.md' -o -name '*.Rmd' | sort > /tmp/all_posts.txt
            while read -r post; do
              [ -z "$post" ] && continue
              # Skip if broadcast: false
              if grep -q 'broadcast:\s*false' "$post" 2>/dev/null; then
                continue
              fi
              # Skip if already sent
              if grep -q 'sent:\s*true' "$post" 2>/dev/null; then
                continue
              fi
              # Skip if work branch already marks it as sent
              _slug=$(basename "$post" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              _cat=$(dirname "$post" | xargs basename)
              _wbranch="work/broadcast/${_cat}-${_slug}"
              if git fetch origin "$_wbranch" 2>/dev/null && \
                 git show "origin/${_wbranch}:${post}" 2>/dev/null | grep -q 'sent:\s*true'; then
                echo "  SALTA (già in work branch \`${_wbranch}\`): $post"
                continue
              fi
              # Include if broadcast: is present (either true or mapping)
              if grep -q 'broadcast:' "$post" 2>/dev/null; then
                echo "$post" >> /tmp/posts_to_broadcast.txt
              fi
            done < /tmp/all_posts.txt
          fi

          # Filter: only include posts that exist
          : > /tmp/to_process.txt
          while read -r post; do
            [ -z "$post" ] && continue
            if [ ! -f "$post" ]; then
              echo "  SALTA (file non trovato): $post"
              continue
            fi
            echo "$post" >> /tmp/to_process.txt
          done < /tmp/posts_to_broadcast.txt

          count=$(wc -l < /tmp/to_process.txt 2>/dev/null || echo 0)
          count=$(echo "$count" | tr -d ' ')
          echo "Post da elaborare: ${count:-0}"
          cat /tmp/to_process.txt

          if [ "${count:-0}" -eq 0 ] 2>/dev/null; then
            echo "no_posts=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_posts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Broadcast posts 📡
        if: steps.find.outputs.no_posts != 'true'
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          POSTS=$(cat /tmp/to_process.txt 2>/dev/null | tr '\n' ' ' | xargs)
          if [ -z "$POSTS" ]; then
            echo "Nessun post da broadcastare."
            exit 0
          fi
          echo "Broadcasting: $POSTS"
          python3 _scripts/broadcast.py $POSTS

      - name: Check for frontmatter changes ✏️
        if: success() && steps.find.outputs.no_posts != 'true'
        id: changes
        run: |
          if git diff --name-only | grep -q '_posts/'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to work branches 📝
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          while read -r post; do
            [ -z "$post" ] && continue
            slug=$(basename "$post" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
            cat_dir=$(dirname "$post" | xargs basename)
            wbranch="work/broadcast/${cat_dir}-${slug}"

            echo "📝 ${wbranch} ← ${post}"

            # Save modified file before switching branches
            cp "$post" /tmp/post_content.md

            git fetch origin "$wbranch" 2>/dev/null || true

            if git ls-remote --heads origin "$wbranch" | grep -q "$wbranch"; then
              git checkout -B "$wbranch" "origin/$wbranch"
              if ! git merge origin/main --no-edit -m "broadcast: refresh from main"; then
                echo "  Conflitto merge — ricreo da main"
                git merge --abort
                git checkout -B "$wbranch" origin/main
              fi
            else
              git checkout -B "$wbranch" origin/main
            fi

            cp /tmp/post_content.md "$post"
            git add "$post"
            git commit -m "broadcast: mark post(s) as sent

          Auto-generated by broadcast-social workflow." || echo "  (no changes to commit)"
            # --force-with-lease se il branch esiste già da remoto; push semplice se è nuovo
            if git ls-remote --heads origin "$wbranch" | grep -q "$wbranch"; then
              git push --force-with-lease origin "$wbranch"
            else
              git push origin "$wbranch"
            fi
          done < /tmp/to_process.txt

      - name: Trigger collector 🔄
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run collect-incubator-pr.yml

      - name: No posts to process
        if: steps.find.outputs.no_posts == 'true'
        run: echo "Nessun post da broadcastare. Fine."