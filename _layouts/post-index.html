---
layout: default
---

{%- if page.master %}
  {%- assign overlay = page.master | cloudinary_hero: page.header %}
{%- elsif page.header.overlay_image %}
  {%- assign overlay = page.header.overlay_image | relative_url %}
{%- endif %}
{% if overlay %}
<div class="main-header-image">
  <img src="{{ overlay }}"
       alt="{{ page.header.overlay_alt | default: page.title | strip_html }}"
       loading="eager"
       decoding="async">
</div>
{% endif %}

<article>
  <h1 class="entry-title">{{ page.title }}</h1>
</article>

{{ content }}
