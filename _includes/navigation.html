<header class="site-header">
  <div class="container site-header__inner">
    <div class="site-branding">
      {% if site.site_logo %}
      <a href="{{ '/' | relative_url }}" class="site-logo-link" aria-label="{{ site.name | default: site.title }}">
        <img src="{% if jekyll.environment == 'production' %}{{ site.site_logo | cloudinary_logo: 80 }}{% else %}{{ site.site_logo | relative_url }}{% endif %}"
             alt="{{ site.name | default: site.title }} logo"
             class="site-logo"
             width="40"
             height="40"
             decoding="async">
      </a>
      {% endif %}
      <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>

    <button type="button"
            class="nav-toggle"
            aria-label="{{ site.data.ui-text[site.locale].menu_label | default: 'Menu' }}"
            aria-expanded="false"
            aria-controls="nav-menu">
      <span class="nav-toggle__icon" aria-hidden="true"></span>
    </button>

    <nav id="nav-menu" aria-label="{{ site.data.ui-text[site.locale].menu_label | default: 'Main navigation' }}">
      <ul class="navigation-bar">
        {% for navpage in site.pages %}
          {% if navpage.show_nav == true %}
            <li><a href="{{ navpage.url | relative_url }}">{{ navpage.title | strip_html }}</a></li>
          {% endif %}
        {% endfor %}
        <li>
          <button type="button"
                  class="theme-toggle"
                  aria-label="{{ site.data.ui-text[site.locale].toggle_theme | default: 'Toggle dark mode' }}"
                  data-theme-toggle>
            {% include icon.html name="weather-night" class="icon-moon" %}
            {% include icon.html name="weather-sunny" class="icon-sun" %}
          </button>
        </li>
      </ul>
    </nav>
  </div>
</header>
